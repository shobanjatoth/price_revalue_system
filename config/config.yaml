data:
  raw_data_path: data/01-raw/cars_24_combined.csv
  test_size: 0.2

artifacts:
  train_data_path: artifacts/train.csv
  test_data_path: artifacts/test.csv
  train_processed_path: artifacts/train_processed.csv
  test_processed_path: artifacts/test_processed.csv
  model_path: artifacts/model.pkl
  encoder_path: artifacts/encoder.pkl
  metrics_path: artifacts/metrics.json

training:
  random_state: 42
  objective: reg:squarederror
  n_estimators: 1000
  max_depth: 3
  learning_rate: 0.06767511170093529
  subsample: 0.6851533921965522
  colsample_bytree: 0.9026723137593877
  reg_lambda: 0.0008354513528417428
  reg_alpha: 0.0010090459175947325
  min_child_weight: 6
  log_target: true

mlflow:
  experiment_name: Car_price_Prediction
  registered_model_name: CarPriceModel



 